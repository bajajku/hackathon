<html>
<head>
<style>*{margin:0;padding:0}body{overflow:hidden;background:#1a1018}canvas{display:block}#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:#8a7a6a;font-family:monospace;font-size:13px;opacity:.7;pointer-events:none}</style>

<body>
<div id="info">drag to orbit · scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x12101a);
scene.fog=new THREE.FogExp2(0x12101a,0.015);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,200);
const R=new THREE.WebGLRenderer({antialias:true});
R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.0;
document.body.appendChild(R.domElement);

const C={
sL:0x8a7a6a,sM:0x5a4a3e,sD:0x3a3030,sDD:0x2a2222,
wb:0x4a3a32,wd:0x2a2018,
w:0x5a3a28,wD:0x3a2218,wL:0x6a4a32,wM:0x4a3020,wR:0x7a5a3a,
go:0x8a7a3a,goL:0xaa9a4a,
ir:0x2e2e30,brass:0x8a7a4a,
red:0x8a2a1a,redD:0x6a1a0a,redL:0xaa3a1a,redBright:0xcc4422,
gold:0xaa8a3a,goldL:0xccaa4a,
crystal:0x4a8acc,crystalL:0x6aaaee,crystalGlow:0x3a7abb,
parch:0x9a8a6a,
leather:0x5a3a2a,
};
const bkC=[0x8a3a3a,0x3a4a7a,0x5a7a3a,0x7a5a2a,0x6a3a5a,0x3a6a6a,0x7a4a1a,0x4a3a6a,0x8a6a2a,0x5a3a3a,0xaa6a3a,0x3a5a4a,0x9a5a6a,0x6a6a2a,0xcc8844,0x4488aa];

function mt(c){return new THREE.MeshStandardMaterial({color:c,flatShading:true,roughness:.8,metalness:.05})}
function mm(c){return new THREE.MeshStandardMaterial({color:c,flatShading:true,roughness:.35,metalness:.6})}
function glow(c,i){return new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:i||1})}
function J(g,a){a=a||.05;const p=g.attributes.position;for(let i=0;i<p.count;i++){p.setX(i,p.getX(i)+(Math.random()-.5)*a);p.setY(i,p.getY(i)+(Math.random()-.5)*a);p.setZ(i,p.getZ(i)+(Math.random()-.5)*a);}p.needsUpdate=true;g.computeVertexNormals();return g;}
function A(geo,mat,x,y,z,rx,ry,rz,sx,sy,sz,par){
const m=new THREE.Mesh(geo,mat);m.position.set(x||0,y||0,z||0);
if(rx)m.rotation.x=rx;if(ry)m.rotation.y=ry;if(rz)m.rotation.z=rz;
if(sx||sy||sz)m.scale.set(sx||1,sy||1,sz||1);
m.castShadow=true;m.receiveShadow=true;(par||scene).add(m);return m;}

const RW=18,RH=12,RD=16,fl=[];

// ====== FLOOR ======
A(J(new THREE.BoxGeometry(RW,.4,RD,6,1,5),.06),mt(C.sDD),0,-.2,0);
for(let ix=-4;ix<=4;ix++)for(let iz=-3;iz<=3;iz++)
A(J(new THREE.BoxGeometry(1.8+Math.random()*.3,.05,1.8+Math.random()*.3,2,1,2),.02),mt((ix+iz)%2===0?C.sD:C.sDD),ix*2,.03,iz*2.2);

// ====== WALLS ======
A(J(new THREE.BoxGeometry(RW,RH,.7,6,4,1),.06),mt(C.sD),0,RH/2,-RD/2);
A(J(new THREE.BoxGeometry(.7,RH,RD,1,4,5),.06),mt(C.sD),-RW/2,RH/2,0);
A(J(new THREE.BoxGeometry(.7,RH,RD,1,4,5),.06),mt(C.sD),RW/2,RH/2,0);
A(new THREE.BoxGeometry(RW,.3,RD),mt(C.wd),0,RH+.15,0);

// Dark stone bricks
for(let w=0;w<3;w++)for(let i=0;i<35;i++){
let bx,by,bz,ry=0;by=.3+Math.random()*(RH-1);
if(w===0){bx=(Math.random()-.5)*(RW-2);bz=-RD/2+.45;}
else if(w===1){bz=(Math.random()-.5)*(RD-2);bx=-RW/2+.45;ry=Math.PI/2;}
else{bz=(Math.random()-.5)*(RD-2);bx=RW/2-.45;ry=Math.PI/2;}
A(J(new THREE.BoxGeometry(.8+Math.random()*1.4,.3+Math.random()*.4,.12,2,1,1),.02),mt([0x3a3032,0x4a3a3a,0x2a2528,0x3a3538,0x4a4040][i%5]),bx,by,bz,0,ry);}

// Beams - heavy wooden framework
for(let z=-6;z<=6;z+=3)A(J(new THREE.BoxGeometry(RW-.5,.55,.5,6,1,1),.04),mt(C.wD),0,RH-.2,z);
for(let x=-6;x<=6;x+=4)A(J(new THREE.BoxGeometry(.5,.5,RD-.5,1,1,5),.04),mt(C.wD),x,RH-.45,0);
// Vertical wooden pillars
for(let s=-1;s<=1;s+=2){
for(let z=-5;z<=5;z+=5){
A(J(new THREE.BoxGeometry(.4,RH,.4,1,4,1),.04),mt(C.wM),s*(RW/2-.5),RH/2,z);}}

// ====== UPPER GALLERY / MEZZANINE (wraps all around) ======
const mezH=6.5;
const mezW=3;
// Four sides of mezzanine
// Left side
A(J(new THREE.BoxGeometry(mezW,.25,RD-2,3,1,5),.04),mt(C.wD),-RW/2+mezW/2,mezH,0);
// Right side
A(J(new THREE.BoxGeometry(mezW,.25,RD-2,3,1,5),.04),mt(C.wD),RW/2-mezW/2,mezH,0);
// Back side
A(J(new THREE.BoxGeometry(RW-mezW*2,.25,mezW,4,1,2),.04),mt(C.wD),0,mezH,-RD/2+mezW/2);
// Front side (with gap for open view / stairs)
A(J(new THREE.BoxGeometry(3,.25,mezW,2,1,2),.04),mt(C.wD),-RW/2+mezW/2+1.5,mezH,RD/2-mezW/2);
A(J(new THREE.BoxGeometry(3,.25,mezW,2,1,2),.04),mt(C.wD),RW/2-mezW/2-1.5,mezH,RD/2-mezW/2);

// Inner railing all around
// Left inner edge
A(J(new THREE.BoxGeometry(.18,.12,RD-mezW*2),.03),mt(C.wL),-RW/2+mezW,mezH+1.1,0);
for(let z=-6;z<=6;z+=2)A(new THREE.BoxGeometry(.12,.95,.12),mt(C.wM),-RW/2+mezW,mezH+.55,z);
// Right inner edge
A(J(new THREE.BoxGeometry(.18,.12,RD-mezW*2),.03),mt(C.wL),RW/2-mezW,mezH+1.1,0);
for(let z=-6;z<=6;z+=2)A(new THREE.BoxGeometry(.12,.95,.12),mt(C.wM),RW/2-mezW,mezH+.55,z);
// Back inner edge
A(J(new THREE.BoxGeometry(RW-mezW*2,.12,.18),.03),mt(C.wL),0,mezH+1.1,-RD/2+mezW);
for(let x=-5;x<=5;x+=2.5)A(new THREE.BoxGeometry(.12,.95,.12),mt(C.wM),x,mezH+.55,-RD/2+mezW);
// Front inner edges (with gap)
A(J(new THREE.BoxGeometry(3,.12,.18),.02),mt(C.wL),-RW/2+mezW/2+1.5,mezH+1.1,RD/2-mezW);
A(J(new THREE.BoxGeometry(3,.12,.18),.02),mt(C.wL),RW/2-mezW/2-1.5,mezH+1.1,RD/2-mezW);
for(let x=-8;x<=-5;x+=1.5)A(new THREE.BoxGeometry(.12,.95,.12),mt(C.wM),x,mezH+.55,RD/2-mezW);
for(let x=5;x<=8;x+=1.5)A(new THREE.BoxGeometry(.12,.95,.12),mt(C.wM),x,mezH+.55,RD/2-mezW);

// Support brackets under mezzanine
for(let z=-5;z<=5;z+=3.3){
A(J(new THREE.BoxGeometry(.5,.5,1),.03),mt(C.wD),-RW/2+1.5,mezH-.3,z);
A(J(new THREE.BoxGeometry(.5,.5,1),.03),mt(C.wD),RW/2-1.5,mezH-.3,z);}
for(let x=-4;x<=4;x+=4){
A(J(new THREE.BoxGeometry(1,.5,.5),.03),mt(C.wD),x,mezH-.3,-RD/2+1.5);}

// Books and stacks scattered on mezzanine
function mkMezBooks(x,z){
// Tall stack
const n=3+Math.floor(Math.random()*5);
for(let i=0;i<n;i++){const bw=.25+Math.random()*.2,bd=.18+Math.random()*.15,bh=.035+Math.random()*.02;
A(new THREE.BoxGeometry(bw,bh,bd),mt(bkC[Math.floor(Math.random()*bkC.length)]),x+(Math.random()-.5)*.1,mezH+.13+i*(bh+.003),z+(Math.random()-.5)*.1,0,(Math.random()-.5)*.3);}}
// Left mezzanine book piles
mkMezBooks(-RW/2+1.5,-4);mkMezBooks(-RW/2+1.5,-1);mkMezBooks(-RW/2+2,2);
mkMezBooks(-RW/2+1,4.5);mkMezBooks(-RW/2+2.2,0);mkMezBooks(-RW/2+1.3,5.5);
// Right mezzanine book piles
mkMezBooks(RW/2-1.5,-4);mkMezBooks(RW/2-1.5,-1);mkMezBooks(RW/2-2,2);
mkMezBooks(RW/2-1,4.5);mkMezBooks(RW/2-2.2,0);mkMezBooks(RW/2-1.3,5.5);
// Back mezzanine book piles
mkMezBooks(-3,-RD/2+1.5);mkMezBooks(0,-RD/2+1.5);mkMezBooks(3,-RD/2+1.5);
mkMezBooks(-5,-RD/2+2);mkMezBooks(5,-RD/2+2);
// Some open books lying flat
for(let i=0;i<6;i++){const ox=[-7,7,-6,6,-2,2][i],oz=[-3,-3,1,1,-6.5,-6.5][i];
A(new THREE.BoxGeometry(.3,.02,.22),mt(bkC[Math.floor(Math.random()*bkC.length)]),ox,mezH+.14,oz,0,Math.random()*3);
}
// Leaning books against railing
for(let i=0;i<4;i++){const side=i<2?-1:1;const z=-3+i*3;
A(new THREE.BoxGeometry(.06,.35,.22),mt(bkC[Math.floor(Math.random()*bkC.length)]),side*(RW/2-mezW+.15),mezH+.3,z,0,0,(Math.random()-.3)*.4);}
// Small reading desk on mezzanine (left)
{const md=new THREE.Group();
A(J(new THREE.BoxGeometry(.8,.08,.5),.01),mt(C.w),0,.9,0,0,0,0,0,0,0,md);
for(let lx=-1;lx<=1;lx+=2)A(new THREE.BoxGeometry(.08,.9,.08),mt(C.wD),lx*.3,.45,0,0,0,0,0,0,0,md);
A(new THREE.BoxGeometry(.4,.03,.3),mt(bkC[2]),0,.95,.05,0,.2,0,0,0,0,md);
md.position.set(-RW/2+1.8,mezH,3);scene.add(md);}
// Small reading desk on mezzanine (right)
{const md=new THREE.Group();
A(J(new THREE.BoxGeometry(.8,.08,.5),.01),mt(C.w),0,.9,0,0,0,0,0,0,0,md);
for(let lx=-1;lx<=1;lx+=2)A(new THREE.BoxGeometry(.08,.9,.08),mt(C.wD),lx*.3,.45,0,0,0,0,0,0,0,md);
A(new THREE.BoxGeometry(.4,.03,.3),mt(bkC[5]),0,.95,.05,0,-.3,0,0,0,0,md);
md.position.set(RW/2-1.8,mezH,3);scene.add(md);}

// ====== UPPER BOOKSHELVES (on mezzanine) ======
function mkShelf(x,z,ry,rows,sw,sd){
rows=rows||4;sw=sw||2.5;sd=sd||.6;
const g=new THREE.Group();
A(J(new THREE.BoxGeometry(sw,rows*1.1+.2,sd,2,rows,1),.03),mt(C.wD),0,(rows*1.1+.2)/2,0,0,0,0,0,0,0,g);
for(let s=0;s<rows;s++){const sy=.2+s*1.1;
A(new THREE.BoxGeometry(sw+.04,.08,sd+.04),mt(C.w),0,sy,0,0,0,0,0,0,0,g);
let cx=-sw/2+.1;
while(cx<sw/2-.1){const bw=.06+Math.random()*.08,bh=.55+Math.random()*.4;
A(new THREE.BoxGeometry(bw,bh,sd-.15),mt(bkC[Math.floor(Math.random()*bkC.length)]),cx+bw/2,sy+.04+bh/2,sd/2-.15,0,0,(Math.random()-.5)*.05,0,0,0,g);
cx+=bw+.008;if(Math.random()<.06)cx+=.08;}}
A(J(new THREE.BoxGeometry(sw+.06,.12,sd+.06),.02),mt(C.w),0,rows*1.1+.2,0,0,0,0,0,0,0,g);
g.position.set(x,0,z);g.rotation.y=ry||0;scene.add(g);return g;}

// Upper level shelves (left) - placed on mezzanine floor
for(let z=-5.5;z<=5.5;z+=2.8){const sh=mkShelf(-RW/2+1.2,z,Math.PI/2,3,2.2,.55);sh.position.y=mezH;}
// Upper level shelves (right)
for(let z=-5.5;z<=5.5;z+=2.8){const sh=mkShelf(RW/2-1.2,z,-Math.PI/2,3,2.2,.55);sh.position.y=mezH;}
// Upper level shelves (back wall)
for(let x=-5;x<=5;x+=3.5){const sh=mkShelf(x,-RD/2+1.2,0,3,2.8,.55);sh.position.y=mezH;}

// ====== LOWER BOOKSHELVES ======
// Back wall
mkShelf(-6,-RD/2+1,0,5,3,.6);
mkShelf(6,-RD/2+1,0,5,3,.6);
mkShelf(0,-RD/2+1,0,5,3,.6);
// Side walls lower (below mezzanine)
for(let z=-5;z<=5;z+=2.8){mkShelf(-RW/2+1,z,Math.PI/2,5,2.4,.6);mkShelf(RW/2-1,z,-Math.PI/2,5,2.4,.6);}

// ====== FLOOR BOOK STACKS (scattered piles) ======
function mkBookPile(x,z,n){n=n||5;
for(let i=0;i<n;i++){const bw=.3+Math.random()*.3,bd=.2+Math.random()*.2,bh=.04+Math.random()*.03;
A(new THREE.BoxGeometry(bw,bh,bd),mt(bkC[Math.floor(Math.random()*bkC.length)]),x+(Math.random()-.5)*.15,.02+i*(bh+.005),z+(Math.random()-.5)*.15,0,(Math.random()-.5)*.3);}}
mkBookPile(-4,2,6);mkBookPile(-3.5,2.5,4);mkBookPile(-5,3,5);
mkBookPile(4,2,7);mkBookPile(3.5,3,4);mkBookPile(5,2.5,5);
mkBookPile(-3,5,4);mkBookPile(3,5,3);mkBookPile(-2,6,5);mkBookPile(2,6,4);
mkBookPile(-5,-3,6);mkBookPile(5,-3,5);mkBookPile(-4,0,4);mkBookPile(4,0,3);
mkBookPile(-1,5.5,3);mkBookPile(1,5.5,4);
mkBookPile(0,-4,5);mkBookPile(-2,-5,4);mkBookPile(2,-5,3);

// ====== GRAND RED CARPET ======
A(J(new THREE.BoxGeometry(7,.04,10,5,1,6),.03),mt(C.red),0,.15,0);
A(J(new THREE.BoxGeometry(7.4,.03,10.4,5,1,6),.02),mt(C.gold),0,.12,0);
// Inner carpet
A(J(new THREE.BoxGeometry(5,.05,7,4,1,5),.02),mt(C.redD),0,.18,0);
A(J(new THREE.BoxGeometry(5.3,.045,7.3,4,1,5),.02),mt(C.goldL),0,.16,0);

// ====== CENTRAL ARCHWAY MONUMENT ======
const arch=new THREE.Group();
// Base platform (hexagonal feel)
A(J(new THREE.CylinderGeometry(3,3.3,.5,6),.06),mt(C.sL),0,.25,0,0,0,0,0,0,0,arch);
A(J(new THREE.CylinderGeometry(2.5,2.8,.3,6),.04),mt(C.sM),0,.55,0,0,Math.PI/6,0,0,0,0,arch);

// Four main pillars
for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+Math.PI/4;
const px=Math.cos(a)*1.8,pz=Math.sin(a)*1.8;
// Pillar base
A(J(new THREE.BoxGeometry(.8,.6,.8,1,1,1),.04),mt(C.sL),px,.9,pz,0,a,0,0,0,0,arch);
// Pillar shaft
A(J(new THREE.BoxGeometry(.5,4,.5,1,4,1),.04),mt(C.sL),px,3.2,pz,0,a,0,0,0,0,arch);
// Pillar capital
A(J(new THREE.BoxGeometry(.7,.4,.7,1,1,1),.03),mt(C.sM),px,5.4,pz,0,a,0,0,0,0,arch);}

// Gothic arches connecting pillars
for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+Math.PI/4;
const a2=((i+1)/4)*Math.PI*2+Math.PI/4;
const mx=(Math.cos(a)+Math.cos(a2))/2*1.8;
const mz=(Math.sin(a)+Math.sin(a2))/2*1.8;
// Arch beam
A(J(new THREE.BoxGeometry(2,.3,.25,2,1,1),.03),mt(C.sM),mx,5.6,mz,0,(a+a2)/2+Math.PI/2,0,0,0,0,arch);
// Pointed arch top pieces
for(let s=-1;s<=1;s+=2){
A(J(new THREE.BoxGeometry(1.1,.25,.2),.02),mt(C.sL),mx+Math.cos((a+a2)/2+Math.PI/2)*s*.3,6.2+Math.abs(s)*.3,mz+Math.sin((a+a2)/2+Math.PI/2)*s*.3,0,(a+a2)/2+Math.PI/2,s*.35,0,0,0,arch);}
// Keystone
A(J(new THREE.BoxGeometry(.3,.35,.22),.02),mt(C.sM),mx*0.95,6.8,mz*0.95,0,(a+a2)/2+Math.PI/2,0,0,0,0,arch);}

// Top spire frame
A(J(new THREE.CylinderGeometry(.3,1.2,1.5,4),.06),mt(C.wR),0,7,0,0,Math.PI/4,0,0,0,0,arch);
A(J(new THREE.CylinderGeometry(.05,.3,.8,4),.04),mt(C.wD),0,7.9,0,0,Math.PI/4,0,0,0,0,arch);

// Central pedestal
A(J(new THREE.BoxGeometry(1,.3,1),.03),mt(C.sM),0,.85,0,0,0,0,0,0,0,arch);
A(J(new THREE.CylinderGeometry(.3,.4,1.2,6),.03),mt(C.sL),0,1.5,0,0,0,0,0,0,0,arch);
A(J(new THREE.BoxGeometry(.7,.15,.7),.02),mt(C.sM),0,2.15,0,0,Math.PI/4,0,0,0,0,arch);

// ====== CRYSTAL ======
const crystalMat=new THREE.MeshStandardMaterial({color:0x2255aa,flatShading:true,roughness:.03,metalness:.75,transparent:true,opacity:.88,emissive:0x2266dd,emissiveIntensity:2.2});
// Elongated drop-shaped gem: sphere geo with low segments for large visible facets, scaled taller
const crys=A(J(new THREE.SphereGeometry(.88,8,6),.06),crystalMat,0,3.4,0,0,0,0,1,1.55,1,arch);
// Crystal mid glow layer - bright blue
const crystInner=A(new THREE.SphereGeometry(.62,7,5),new THREE.MeshBasicMaterial({color:0x66aaff,transparent:true,opacity:.75}),0,3.4,0,0,0,0,1,1.4,1,arch);
// Crystal bright white-blue core
const crystCore=A(new THREE.SphereGeometry(.32,6,5),new THREE.MeshBasicMaterial({color:0xddeeff,transparent:true,opacity:.97}),0,3.55,0,0,0,0,1,1.2,1,arch);
// Tiny white hot center
const crystHot=A(new THREE.SphereGeometry(.14,5,4),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:1}),0,3.6,0,0,0,0,1,1,1,arch);

arch.position.set(0,0,0);scene.add(arch);

// Crystal light - strong blue-white
const crystLight=new THREE.PointLight(0x88bbff,6,16);crystLight.position.set(0,3.8,0);scene.add(crystLight);
// Secondary warm fill from below
const crystLight2=new THREE.PointLight(0x4488ff,3,8);crystLight2.position.set(0,2.2,0);scene.add(crystLight2);

// Small cyan orbs around archway
for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;
const ox=Math.cos(a)*2.2,oz=Math.sin(a)*2.2;
A(new THREE.SphereGeometry(.06,4,3),glow(C.crystalL,.9),ox,5.8+Math.sin(a*2)*.2,oz,0,0,0,0,0,0,arch);
const ol=new THREE.PointLight(C.crystal,.3,3);ol.position.set(ox,5.8,oz);arch.add(ol);}

// ====== SMALL DESKS / READING SPOTS ======
function mkSmallDesk(x,z,ry){const d=new THREE.Group();
A(J(new THREE.BoxGeometry(1.2,.1,.8,2,1,1),.02),mt(C.w),0,1.2,0,0,0,0,0,0,0,d);

// Books on desk
for(let i=0;i<2;i++)A(new THREE.BoxGeometry(.25,.04,.18),mt(bkC[Math.floor(Math.random()*bkC.length)]),(Math.random()-.5)*.5,1.25+i*.045,(Math.random()-.5)*.3,0,Math.random()*.4,0,0,0,0,d);
d.position.set(x,0,z);d.rotation.y=ry||0;scene.add(d);}
mkSmallDesk(-4,4,0.2);mkSmallDesk(4,4,-0.2);
mkSmallDesk(-3,-4,0.1);mkSmallDesk(3,-4,-0.1);

// ====== STOOLS ======
function mkStool(x,z){const s=new THREE.Group();
A(J(new THREE.CylinderGeometry(.22,.2,.06,6),.01),mt(C.w),0,.7,0,0,0,0,0,0,0,s);
for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;
A(new THREE.CylinderGeometry(.03,.04,.68,4),mt(C.wD),Math.cos(a)*.14,.34,Math.sin(a)*.14,0,0,0,0,0,0,s);}
s.position.set(x,0,z);scene.add(s);}
mkStool(-4,4.8);mkStool(4,4.8);mkStool(-3,-4.8);mkStool(3,-4.8);

function mkChest(x,z,s){s=s||1;const ch=new THREE.Group();

// ====== CODA SAMPLE ARTIFACTS ======
const codaPanels = [];
function makeCodaPanel(title, body, opts) {
  opts = opts || {};
  const w = opts.w || 512, h = opts.h || 320;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d');
  g.fillStyle = opts.bg || '#0b0e10';
  g.fillRect(0, 0, w, h);
  g.fillStyle = opts.accent || '#ff7a3d';
  g.fillRect(28, 28, 4, h - 56);
  g.fillStyle = opts.accent || '#ff7a3d';
  g.font = 'bold 16px ui-monospace, monospace';
  g.textBaseline = 'top';
  g.fillText('CODA · ' + (opts.kicker || 'LAST SESSION'), 52, 32);
  g.fillStyle = '#f0ead6';
  g.font = 'bold 32px Georgia, serif';
  g.fillText(title, 52, 60);
  g.fillStyle = '#b8d6df';
  g.font = '20px Georgia, serif';
  const words = body.split(' ');
  let line = '', y = 110;
  for (const word of words) {
    const test = line + word + ' ';
    if (g.measureText(test).width > w - 80 && line) { g.fillText(line.trim(), 52, y); line = word + ' '; y += 28; }
    else line = test;
  }
  if (line) g.fillText(line.trim(), 52, y);
  g.fillStyle = opts.accent || '#ff7a3d';
  g.beginPath(); g.arc(w - 48, h - 48, 10, 0, Math.PI * 2); g.fill();
  const tex = new THREE.CanvasTexture(c);
  if ('encoding' in tex) tex.encoding = THREE.sRGBEncoding;
  tex.anisotropy = 4;
  const aspect = w / h;
  const planeH = opts.planeH || 1.8;
  const m = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(planeH * aspect, planeH), m);
  mesh.userData.bobOffset = Math.random() * Math.PI * 2;
  return mesh;
}
function pinCodaPanel(mesh, x, y, z, ry) {
  mesh.position.set(x, y, z);
  if (typeof ry === 'number') mesh.rotation.y = ry;
  mesh.userData.baseY = y;
  codaPanels.push(mesh);
  scene.add(mesh);
}

// ====== ORBIT ======
let isDrag=false,pX=0,pY=0,theta=0,phi=.5,radius=20;
const tgt=new THREE.Vector3(0,4,1);
function upCam(){camera.position.x=tgt.x+radius*Math.sin(phi)*Math.sin(theta);camera.position.y=tgt.y+radius*Math.cos(phi);camera.position.z=tgt.z+radius*Math.sin(phi)*Math.cos(theta);camera.lookAt(tgt);}
upCam();
R.domElement.addEventListener('pointerdown',e=>{isDrag=true;pX=e.clientX;pY=e.clientY;});
window.addEventListener('pointerup',()=>isDrag=false);
window.addEventListener('pointermove',e=>{if(!isDrag)return;theta+=(e.clientX-pX)*.005;phi=Math.max(.15,Math.min(1.4,phi-(e.clientY-pY)*.005));pX=e.clientX;pY=e.clientY;upCam();});
R.domElement.addEventListener('wheel',e=>{radius=Math.max(8,Math.min(35,radius+e.deltaY*.02));upCam();});

// ====== ANIMATE ======
const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();
// Crystal rotation + pulse
crys.rotation.y=t*.3;crys.rotation.x=Math.sin(t*.5)*.1;
crystInner.rotation.y=-t*.5;crystInner.rotation.z=t*.2;
crystCore.rotation.y=t*.4;crystCore.rotation.z=Math.sin(t*.7)*.08;
const pulse=.7+Math.sin(t*2)*.3;
crys.material.emissiveIntensity=1.6+pulse*.8;
crystInner.material.opacity=.6+pulse*.2;
crystCore.material.opacity=.88+pulse*.1;
crystHot.scale.setScalar(.9+pulse*.15);
crystLight.intensity=4.5+pulse*2.5;
crystLight2.intensity=2+pulse*1.5;
// Flicker
fl.forEach(f=>{const n=f.idx||0;
if(f.light){const b=f.baseIntensity||1;f.light.intensity=b+Math.sin(t*7+n)*b*.18+Math.sin(t*13+n*2)*b*.12;}
if(f.flame){f.flame.scale.y=1.5+Math.sin(t*9+n)*.4;f.flame.scale.x=1+Math.sin(t*7+n*3)*.2;}});
for(let i=0;i<codaPanels.length;i++){const p=codaPanels[i];p.position.y=p.userData.baseY+Math.sin(t*.7+p.userData.bobOffset)*.1;}
R.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});
