function mat(color, flat = true) {
  return new THREE.MeshStandardMaterial({ color, flatShading: flat, roughness: 0.85, metalness: 0.05 });
}
function jitter(geo, amount = 0.05) {
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setX(i, pos.getX(i) + (Math.random() - 0.5) * amount);
    pos.setY(i, pos.getY(i) + (Math.random() - 0.5) * amount);
    pos.setZ(i, pos.getZ(i) + (Math.random() - 0.5) * amount);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

  return wall;
}

// === LOCAL ORBIT STATE ===
let theta = 0.8, phi = 0.6, radius = 15;
const target = new THREE.Vector3(0, 3, 0);

function applyOrbit() {
  camera.position.x = target.x + radius * Math.sin(phi) * Math.sin(theta);
  camera.position.y = target.y + radius * Math.cos(phi);
  camera.position.z = target.z + radius * Math.sin(phi) * Math.cos(theta);
  camera.lookAt(target);
}
applyOrbit();

// =====================================================================
// SHARED-WORKSPACE HARNESS (postMessage protocol with parent meeting app)
// =====================================================================
const HARNESS = { v: 1, role: 'participant', ready: false };
const SCENE_ID = 'bedroom';
const roleBadge = document.getElementById('role-badge');

function postOut(msg) {
  if (window.parent && window.parent !== window) {
    try { window.parent.postMessage(msg, '*'); } catch (e) { /* ignore */ }
  }
}

postOut({ type: 'sp:ready', v: 1, t: performance.now(), sceneId: SCENE_ID });
HARNESS.ready = true;

// --- Camera publish (host-only) ---
let lastCamPub = 0;
function publishCameraIfHost() {
  if (HARNESS.role !== 'host') return;
  const now = performance.now();
  if (now - lastCamPub < 80) return;
  lastCamPub = now;
  postOut({
    type: 'sp:camera',
    v: 1,
    t: now,
    pos: [camera.position.x, camera.position.y, camera.position.z],
    target: [target.x, target.y, target.z],
  });
}

// --- Camera lerp from remote (participant only) ---
let remoteCam = null;
function applyRemoteCamera(pos, tgt) {
  remoteCam = {
    fromPos: camera.position.clone(),
    fromTarget: target.clone(),
    toPos: new THREE.Vector3(pos[0], pos[1], pos[2]),
    toTarget: new THREE.Vector3(tgt[0], tgt[1], tgt[2]),
    startT: performance.now(),
    dur: 150,
  };
}
function tickRemoteCam() {
  if (!remoteCam) return;
  const now = performance.now();
  const t = Math.min(1, (now - remoteCam.startT) / remoteCam.dur);
  const e = t * (2 - t);
  camera.position.lerpVectors(remoteCam.fromPos, remoteCam.toPos, e);
  target.lerpVectors(remoteCam.fromTarget, remoteCam.toTarget, e);
  camera.lookAt(target);
  if (t >= 1) remoteCam = null;
}

// --- Drag/zoom (host only) ---
let isDragging = false, prevX = 0, prevY = 0;
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (HARNESS.role !== 'host') return;
  isDragging = true; prevX = e.clientX; prevY = e.clientY;
  renderer.domElement.style.cursor = 'grabbing';
});
window.addEventListener('pointerup', () => {
  isDragging = false;
  if (HARNESS.role === 'host') renderer.domElement.style.cursor = 'grab';
});
window.addEventListener('pointermove', (e) => {
  if (isDragging && HARNESS.role === 'host') {
    theta += (e.clientX - prevX) * 0.005;
    phi = Math.max(0.2, Math.min(1.4, phi - (e.clientY - prevY) * 0.005));
    prevX = e.clientX; prevY = e.clientY;
    applyOrbit();
    publishCameraIfHost();
  }
  raycastCursor(e.clientX, e.clientY);
});
renderer.domElement.addEventListener('wheel', (e) => {
  if (HARNESS.role !== 'host') return;
  e.preventDefault();
  radius = Math.max(6, Math.min(25, radius + e.deltaY * 0.01));
  applyOrbit();
  publishCameraIfHost();
}, { passive: false });

// --- Cursor raycasting (everyone) ---
const raycaster = new THREE.Raycaster();
const mouse2D = new THREE.Vector2();
let lastCursorPub = 0;
let lastCursorHit = null;
function publishCursor(hit) {
  const now = performance.now();
  if (now - lastCursorPub < 80) return;
  if (!hit && !lastCursorHit) return;
  if (hit && lastCursorHit) {
    const dx = hit.pos[0] - lastCursorHit.pos[0];
    const dy = hit.pos[1] - lastCursorHit.pos[1];
    const dz = hit.pos[2] - lastCursorHit.pos[2];
    if (dx * dx + dy * dy + dz * dz < 0.0009) return;
  }
  lastCursorPub = now;
  lastCursorHit = hit;
  postOut({ type: 'sp:cursor', v: 1, t: now, hit });
}
function raycastCursor(clientX, clientY) {
  mouse2D.x = (clientX / innerWidth) * 2 - 1;
  mouse2D.y = -(clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  if (hits.length > 0) {
    const p = hits[0].point;
    publishCursor({ pos: [p.x, p.y, p.z] });
  } else {
    publishCursor(null);
  }
}

// --- Remote cursor markers ---
const remoteCursorMeshes = new Map();
const cursorGeo = new THREE.SphereGeometry(0.18, 8, 6);
const cursorLabels = new Map();

function colorFromId(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  return new THREE.Color(`hsl(${hue}, 70%, 65%)`);
}

function updateRemoteCursors(cursors) {
  const seen = new Set();
  for (const c of cursors) {
    seen.add(c.id);
    let entry = remoteCursorMeshes.get(c.id);
    if (!entry) {
      const m = new THREE.Mesh(
        cursorGeo,
        new THREE.MeshBasicMaterial({ color: colorFromId(c.id), transparent: true, opacity: 0.85 })
      );
      scene.add(m);
      const label = document.createElement('div');
      label.className = 'cursor-label';
      label.textContent = c.name;
      document.body.appendChild(label);
      cursorLabels.set(c.id, label);
      entry = { mesh: m };
      remoteCursorMeshes.set(c.id, entry);
    }
    entry.mesh.position.set(c.pos[0], c.pos[1], c.pos[2]);
    const label = cursorLabels.get(c.id);
    if (label) label.textContent = c.name;
  }
  for (const [id, entry] of remoteCursorMeshes) {
    if (!seen.has(id)) {
      scene.remove(entry.mesh);
      remoteCursorMeshes.delete(id);
      const label = cursorLabels.get(id);
      if (label) {
        label.remove();
        cursorLabels.delete(id);
      }
    }
  }
}

function updateCursorLabels() {
  const tmp = new THREE.Vector3();
  for (const [id, entry] of remoteCursorMeshes) {
    const label = cursorLabels.get(id);
    if (!label) continue;
    tmp.copy(entry.mesh.position).project(camera);
    const x = (tmp.x * 0.5 + 0.5) * innerWidth;
    const y = (-tmp.y * 0.5 + 0.5) * innerHeight;
    const visible = tmp.z > -1 && tmp.z < 1;
    label.style.display = visible ? 'block' : 'none';
    label.style.left = x + 'px';
    label.style.top = y + 'px';
  }
}

// --- Inbound messages from parent ---
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || typeof d !== 'object' || d.v !== 1) return;
  switch (d.type) {
    case 'sp:role':
      HARNESS.role = d.role === 'host' ? 'host' : 'participant';
      if (roleBadge) {
        roleBadge.textContent = HARNESS.role === 'host' ? 'you drive' : 'following host';
      }
      renderer.domElement.style.cursor = HARNESS.role === 'host' ? 'grab' : 'default';
      break;
    case 'sp:setCamera':
      if (HARNESS.role !== 'host') applyRemoteCamera(d.pos, d.target);
      break;
    case 'sp:setSelection':
      // reserved for future highlight UX
      break;
    case 'sp:remoteCursors':
      updateRemoteCursors(Array.isArray(d.cursors) ? d.cursors : []);
      break;
    case 'sp:capture':
      try {
        const maxWidth = typeof d.maxWidth === 'number' ? Math.max(320, d.maxWidth) : 1280;
        const quality = typeof d.quality === 'number' ? Math.min(1, Math.max(0.2, d.quality)) : 0.72;
        const format = d.format === 'image/png' ? 'image/png' : 'image/jpeg';

        let dataUrl;
        const canvas = renderer.domElement;
        if (canvas.width <= maxWidth) {
          dataUrl = canvas.toDataURL(format, quality);
        } else {
          const scale = maxWidth / canvas.width;
          const out = document.createElement('canvas');
          out.width = Math.floor(canvas.width * scale);
          out.height = Math.floor(canvas.height * scale);
          const ctx = out.getContext('2d');
          if (!ctx) throw new Error('2d context unavailable');
          ctx.drawImage(canvas, 0, 0, out.width, out.height);
          dataUrl = out.toDataURL(format, quality);
        }

        postOut({
          type: 'sp:captureFrame',
          v: 1,
          t: performance.now(),
          dataUrl,
          source: SCENE_ID,
        });
      } catch (err) {
        postOut({
          type: 'sp:captureError',
          v: 1,
          t: performance.now(),
          error: (err && err.message) ? err.message : String(err),
        });
      }
      break;
  }
});

// --- Main loop ---
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  candles.forEach((c, i) => {
    const flicker = 0.6 + Math.sin(t * 8 + i * 2) * 0.15 + Math.sin(t * 13 + i) * 0.1;
    c.light.intensity = flicker;
    c.flame.scale.y = 1.3 + Math.sin(t * 10 + i) * 0.3;
    c.flame.scale.x = 1 + Math.sin(t * 7 + i * 3) * 0.15;
  });
  torches.forEach((tc, i) => {
    const flicker = 1 + Math.sin(t * 6 + i * 4) * 0.3 + Math.sin(t * 11 + i * 2) * 0.15;
    tc.light.intensity = flicker;
    tc.flame.scale.y = 1.6 + Math.sin(t * 9 + i * 2) * 0.4;
    tc.flame.scale.x = 1 + Math.sin(t * 8 + i) * 0.2;
  });

  tickRemoteCam();
  updateCursorLabels();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
